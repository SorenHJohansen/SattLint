name: Repo Audit

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  audit:
    name: Repo Audit (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            profile: full
            run_build: true
            run_leak_audit: true
          - os: windows-latest
            profile: quick
            run_build: false
            run_leak_audit: false

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Build distributions
        if: ${{ matrix.run_build }}
        run: python -m build

      - name: Check distribution metadata
        if: ${{ matrix.run_build }}
        run: python -m twine check dist/*

      - name: Run repository audit
        run: python -m sattlint.devtools.repo_audit --profile ${{ matrix.profile }} --output-dir artifacts/audit --fail-on high

      - name: Run leak audit
        if: ${{ matrix.run_leak_audit }}
        run: python -m sattlint.devtools.repo_audit --leaks-only --output-dir artifacts/audit-leaks --fail-on medium

      - name: Upload audit reports
        uses: actions/upload-artifact@v4
        with:
          if-no-files-found: ignore
          name: repo-audit-${{ matrix.os }}
          path: |
            dist/
            artifacts/audit/
            artifacts/audit-leaks/
