name: Repo Audit

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: python -m pip install -e .[dev]

      - name: Build distributions
        run: python -m build

      - name: Check distribution metadata
        run: python -m twine check dist/*

      - name: Run repository audit
        run: python -m sattlint.devtools.repo_audit --output-dir artifacts/audit --fail-on high

      - name: Run leak audit
        run: python -m sattlint.devtools.repo_audit --leaks-only --output-dir artifacts/audit-leaks --fail-on medium

      - name: Upload audit reports
        uses: actions/upload-artifact@v4
        with:
          name: repo-audit
          path: |
            dist/
            artifacts/audit/
            artifacts/audit-leaks/
