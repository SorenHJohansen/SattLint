name: Repo Audit



on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  packaging-and-leak-checks:
    name: Packaging And Leak Checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up shared CI tooling
        uses: ./.github/actions/setup-ci-tooling
        with:
          dependency-spec: ".[dev]"

      - name: Build distributions
        run: python -m build

      - name: Check distribution metadata
        run: python -m twine check dist/*

      - name: Run leak audit
        run: python -m sattlint.devtools.repo_audit --leaks-only --output-dir artifacts/audit-leaks --fail-on medium

      - name: Upload packaging and leak artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          if-no-files-found: ignore
          name: repo-audit-ubuntu-${{ github.run_id }}
          path: |
            dist/
            artifacts/audit-leaks/

  windows-quick-audit:
    name: Windows Quick Audit
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up shared CI tooling
        uses: ./.github/actions/setup-ci-tooling
        with:
          dependency-spec: ".[dev]"

      - name: Run repository audit
        run: python -m sattlint.devtools.repo_audit --profile quick --output-dir artifacts/audit --fail-on high

      - name: Upload Windows audit report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          if-no-files-found: ignore
          name: repo-audit-windows-${{ github.run_id }}
          path: artifacts/audit/
