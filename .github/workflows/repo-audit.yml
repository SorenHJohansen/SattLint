name: Repo Audit



on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  audit:
    name: Repo Audit (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            profile: full
            run_build: true
            run_leak_audit: true
          - os: windows-latest
            profile: quick
            run_build: false
            run_leak_audit: false

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9 # v7

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Install Node
        if: ${{ matrix.os == 'ubuntu-latest' }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - name: Install markdownlint-cli2
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: npm install --global markdownlint-cli2@0.22.1

      - name: Lint Markdown
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: markdownlint-cli2 --config .markdownlint-cli2.jsonc

      - name: Build distributions
        if: ${{ matrix.run_build }}
        run: python -m build

      - name: Check distribution metadata
        if: ${{ matrix.run_build }}
        run: python -m twine check dist/*

      - name: Run repository audit
        run: python -m sattlint.devtools.repo_audit --profile ${{ matrix.profile }} --output-dir artifacts/audit --fail-on high

      - name: Run leak audit
        if: ${{ matrix.run_leak_audit }}
        run: python -m sattlint.devtools.repo_audit --leaks-only --output-dir artifacts/audit-leaks --fail-on medium

      - name: Upload audit reports
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          if-no-files-found: ignore
          name: repo-audit-${{ matrix.os }}
          path: |
            dist/
            artifacts/audit/
            artifacts/audit-leaks/
