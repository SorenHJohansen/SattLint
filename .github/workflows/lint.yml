name: Lint


on: [push, pull_request]

permissions:
  contents: read

jobs:
  actionlint:
    name: GitHub Actions Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up shared CI tooling
        uses: ./.github/actions/setup-ci-tooling
        with:
          install-dependencies: "false"
          install-actionlint: "true"

      - name: Run actionlint
        run: python scripts/run_actionlint.py

  ruff:
    name: Ruff (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up shared CI tooling
        uses: ./.github/actions/setup-ci-tooling
        with:
          dependency-spec: ".[dev]"

      - name: Pin Ruff version
        run: uv pip install --system "ruff==0.15.12"

      - name: Run Ruff
        run: python -m ruff check src tests

      - name: Run Ruff Format
        run: python -m ruff format --check src

  bandit:
    name: Bandit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up shared CI tooling
        uses: ./.github/actions/setup-ci-tooling
        with:
          dependency-spec: ".[dev]"

      - name: Run Bandit
        run: python -m bandit -r src/ -c pyproject.toml

  doc-gardener:
    name: Doc Gardener
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up shared CI tooling
        uses: ./.github/actions/setup-ci-tooling
        with:
          dependency-spec: ".[dev]"

      - name: Run doc-gardener scan
        run: sattlint-doc-gardener

  layer-lint:
    name: Layer Linter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up shared CI tooling
        uses: ./.github/actions/setup-ci-tooling
        with:
          dependency-spec: ".[dev]"

      - name: Run layer linter
        run: sattlint-layer-lint

  review:
    name: Agent Review (Advisory)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up shared CI tooling
        uses: ./.github/actions/setup-ci-tooling
        with:
          dependency-spec: ".[dev]"

      - name: Run advisory agent review
        run: sattlint-review
        continue-on-error: true
