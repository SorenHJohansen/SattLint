name: Quality



on: [push, pull_request]

permissions:
  contents: read

jobs:
  pyright:
    name: Pyright (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: |
          uv pip install --system -e ".[dev,lsp]"
          uv pip install --system pyright

      - name: Run Pyright
        run: python -m pyright src/sattlint src/sattline_parser

  tests:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv pip install --system -e ".[dev,lsp]"

      - name: Run pre-commit hooks
        run: python -m pre_commit run --all-files

      - name: Run pytest with coverage
        run: python -m pytest -q --tb=short

  pip-audit:
    name: Pip Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv pip install --system -e ".[dev,lsp]"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Audit dependencies
        run: pip-audit --skip-editable
