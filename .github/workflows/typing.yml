name: Typing And Quality



on: [push, pull_request]

permissions:
  contents: read

jobs:
  pyright:
    name: Pyright (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set up shared CI tooling
        uses: ./.github/actions/setup-ci-tooling
        with:
          dependency-spec: ".[dev,lsp]"

      - name: Pin Pyright version
        run: uv pip install --system "pyright==1.1.409"

      - name: Run Pyright
        run: python -m pyright src/sattlint src/sattline_parser

  tests:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set up shared CI tooling
        uses: ./.github/actions/setup-ci-tooling
        with:
          dependency-spec: ".[dev,lsp]"
          install-node: "true"
          install-markdownlint: "true"

      - name: Run pytest with coverage
        run: python -m pytest -q --tb=short

  pip-audit:
    name: Pip Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up shared CI tooling
        uses: ./.github/actions/setup-ci-tooling
        with:
          dependency-spec: ".[dev,lsp]"

      - name: Pin pip-audit version
        run: uv pip install --system --upgrade pip "pip-audit==2.10.0"

      - name: Audit dependencies
        run: pip-audit --skip-editable

  ratchet_policy:
    name: Ratchet Policy
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set up shared CI tooling
        uses: ./.github/actions/setup-ci-tooling
        with:
          install-dependencies: "false"

      - name: Install ratchet policy dependency
        run: python -m pip install "defusedxml==0.7.1"

      - name: Fetch pull request base ref
        if: ${{ github.event_name == 'pull_request' }}
        run: git fetch --no-tags --depth=1 origin "${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}"

      - name: Enforce ratchet backslide policy
        run: python scripts/check_ratchet_policy.py
