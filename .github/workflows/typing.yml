name: Quality



on: [push, pull_request]

permissions:
  contents: read

jobs:
  pyright:
    name: Pyright (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Install Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9 # v7

      - name: Install dependencies
        run: |
          uv pip install --system -e ".[dev,lsp]"
          uv pip install --system "pyright==1.1.409"

      - name: Run Pyright
        run: python -m pyright src/sattlint src/sattline_parser

  tests:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Install Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9 # v7

      - name: Install dependencies
        run: uv pip install --system -e ".[dev,lsp]"

      - name: Install Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"

      - name: Install markdownlint-cli2
        run: npm install --global markdownlint-cli2@0.22.1

      - name: Install actionlint
        shell: bash
        run: |
          curl -sSL -o /tmp/actionlint.tar.gz "https://github.com/rhysd/actionlint/releases/download/v1.7.12/actionlint_1.7.12_linux_amd64.tar.gz"
          tar -xzf /tmp/actionlint.tar.gz -C /tmp
          sudo install -m 0755 /tmp/actionlint /usr/local/bin/actionlint
          actionlint --version

      - name: Run pre-commit hooks
        run: |
          export PATH="/usr/local/bin:$PATH"
          python -m pre_commit run --all-files

      - name: Run pytest with coverage
        run: python -m pytest -q --tb=short

      - name: Enforce ratchet policy
        run: python scripts/check_ratchet_policy.py

  pip-audit:
    name: Pip Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9 # v7

      - name: Install dependencies
        run: |
          uv pip install --system --upgrade pip
          uv pip install --system -e ".[dev,lsp]"
          uv pip install --system "pip-audit==2.10.0"

      - name: Audit dependencies
        run: pip-audit --skip-editable

  ratchet_policy:
    name: Ratchet Policy
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"

      - name: Install ratchet policy dependency
        run: python -m pip install "defusedxml==0.7.1"

      - name: Fetch pull request base ref
        if: ${{ github.event_name == 'pull_request' }}
        run: git fetch --no-tags --depth=1 origin "${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}"

      - name: Enforce ratchet backslide policy
        run: python scripts/check_ratchet_policy.py
