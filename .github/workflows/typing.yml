name: Typing And Quality

on: [push, pull_request]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pyright:
    name: Pyright (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          fetch-depth: 0

      - name: Set up shared CI tooling
        uses: ./.github/actions/setup-ci-tooling
        with:
          dependency-spec: ".[dev,lsp]"

      - name: Install Pyright from pyproject constraint
        shell: bash
        run: |
          pyright_spec=$(
            python -c "import tomllib; from pathlib import Path; data = tomllib.loads(Path('pyproject.toml').read_text()); deps = data['project']['optional-dependencies']['dev']; print(next(dep for dep in deps if dep.startswith('pyright')))"
          )
          uv pip install --system "$pyright_spec"

      - name: Run Pyright
        run: python -m pyright src/sattlint src/sattline_parser

  tests:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          fetch-depth: 0

      - name: Set up shared CI tooling
        uses: ./.github/actions/setup-ci-tooling
        with:
          dependency-spec: ".[dev,lsp]"
          install-node: "true"
          install-markdownlint: "true"

      - name: Run pytest with coverage
        run: python -m pytest -q --tb=short

  vulture:
    name: Vulture
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          fetch-depth: 0

      - name: Set up shared CI tooling
        uses: ./.github/actions/setup-ci-tooling
        with:
          dependency-spec: ".[dev,lsp]"

      - name: Run Vulture dead code analysis
        run: python -m vulture src --min-confidence 80

  pip-audit:
    name: Pip Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Set up shared CI tooling
        uses: ./.github/actions/setup-ci-tooling
        with:
          install-dependencies: "false"

      - name: Pin pip-audit version
        run: uv pip install --system --upgrade pip "pip-audit==2.10.0"

      - name: Audit dependencies
        run: pip-audit --skip-editable

  npm-audit:
    name: Npm Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: vscode/sattline-vscode
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Set up shared CI tooling
        uses: ./.github/actions/setup-ci-tooling
        with:
          install-dependencies: "false"
          install-node: "true"

      - name: Materialize npm lockfile for audit
        run: npm install --package-lock-only --ignore-scripts --no-fund --no-audit

      - name: Audit VS Code client dependencies
        run: npm audit --audit-level=high
