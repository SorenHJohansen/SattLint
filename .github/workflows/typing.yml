name: Quality



on: [push, pull_request]

permissions:
  contents: read

jobs:
  pyright:
    name: Pyright (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: |
          uv pip install --system -e ".[dev,lsp]"
          uv pip install --system pyright

      - name: Run Pyright
        run: python -m pyright src/sattlint src/sattline_parser

  tests:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv pip install --system -e ".[dev,lsp]"

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run pre-commit hooks
        run: python -m pre_commit run --all-files

      - name: Run pytest with coverage
        run: python -m pytest -q --tb=short

      - name: Enforce ratchet policy
        run: python scripts/check_ratchet_policy.py

  pip-audit:
    name: Pip Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv pip install --system -e ".[dev,lsp]"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Audit dependencies
        run: pip-audit --skip-editable

  ratchet_policy:
    name: Ratchet Policy
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install ratchet policy dependency
        run: python -m pip install defusedxml

      - name: Fetch pull request base ref
        if: ${{ github.event_name == 'pull_request' }}
        run: git fetch --no-tags --depth=1 origin "${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}"

      - name: Enforce ratchet backslide policy
        run: python scripts/check_ratchet_policy.py
