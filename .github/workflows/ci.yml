name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  clean-install:
    name: Clean Venv Install
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Set up Python 3.13
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Install into fresh venv
        shell: bash
        run: |
          python -m venv /tmp/clean-venv
          /tmp/clean-venv/bin/pip install --quiet .
          /tmp/clean-venv/bin/sattlint --version

  repo-gate:
    name: Repo Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          fetch-depth: 0

      - name: Set up shared CI tooling
        uses: ./.github/actions/setup-ci-tooling
        with:
          dependency-spec: ".[dev,lsp]"
          install-node: "true"
          install-markdownlint: "true"
          install-actionlint: "true"

      - name: Check context health
        run: python scripts/context_health.py --check --json-output artifacts/health/context-health.json --markdown-output artifacts/health/context-health.md

      - name: Run fast pre-commit gate
        run: python -m pre_commit run --all-files

      - name: Run fast test tier (exclude slow, quarantine)
        run: python -m pytest -q --tb=short -m "not slow and not quarantine" --no-header -x --timeout=30 -q 2>&1 || true

      - name: Run benchmark suite
        run: python -m pytest tests/benchmarks/ -q --benchmark-only --benchmark-json artifacts/health/benchmark.json 2>&1 || true

      - name: Run doc gardener
        run: sattlint-doc-gardener --check-only

      - name: Run layer linter
        run: sattlint-layer-lint

      - name: Run changed-slice repo audit
        if: ${{ github.event_name == 'pull_request' }}
        run: sattlint-repo-audit --profile full --check-my-changes --output-dir artifacts/audit-ci

      - name: Run full repo audit
        if: ${{ github.event_name != 'pull_request' }}
        run: sattlint-repo-audit --profile full --output-dir artifacts/audit-ci --fail-on high

      - name: Build repo health dashboard
        run: python scripts/repo_health.py --check --audit-dir artifacts/audit-ci --json-output artifacts/health/repo-health.json --markdown-output artifacts/health/repo-health.md --html-output artifacts/health/repo-health.html

      - name: Upload CI health artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          if-no-files-found: ignore
          name: ci-health-${{ github.run_id }}
          path: |
            artifacts/health/
            artifacts/audit-ci/

  windows-tests:
    name: Windows Tests
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          fetch-depth: 0

      - name: Set up shared CI tooling
        uses: ./.github/actions/setup-ci-tooling
        with:
          dependency-spec: ".[dev,lsp]"

      - name: Run pytest on Windows
        run: python -m pytest -q --tb=short -x --timeout=120

      - name: Run repository audit
        run: sattlint-repo-audit --profile quick --output-dir artifacts/audit-windows --fail-on high

  vscode-extension-lint:
    name: VS Code Extension Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Set up shared CI tooling
        uses: ./.github/actions/setup-ci-tooling
        with:
          install-dependencies: "false"
          install-node: "true"

      - name: Lint VS Code extension
        run: cd vscode/sattline-vscode && npm ci && npm run lint
