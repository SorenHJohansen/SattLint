name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up shared CI tooling
        uses: ./.github/actions/setup-ci-tooling
        with:
          dependency-spec: ".[dev]"

      - name: Build distributions
        run: python -m build

      - name: Check distribution metadata
        run: python -m twine check dist/*

      - name: Run release smoke rehearsal
        shell: bash
        run: |
          wheel_path=$(find dist -maxdepth 1 -name '*.whl' -print -quit)
          if [[ -z "$wheel_path" ]]; then
            echo "Built wheel not found in dist/" >&2
            exit 1
          fi
          sattlint-release-smoke \
            --wheel "$wheel_path" \
            --sample-file tests/fixtures/sample_sattline_files/SattLineFullGrammarTest.s \
            --output-dir artifacts/release-smoke

      - name: Upload distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          if-no-files-found: error
          name: pypi-dist-${{ github.run_id }}
          path: dist/*

      - name: Upload release smoke artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          if-no-files-found: error
          name: release-smoke-${{ github.run_id }}
          path: artifacts/release-smoke/

  publish:
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
    needs: build
    runs-on: ubuntu-latest
    environment: pypi-release
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: pypi-dist-${{ github.run_id }}
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
        with:
          packages-dir: dist
