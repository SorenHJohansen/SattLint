name: Nightly Health

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  nightly-health:
    name: Nightly Health
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set up shared CI tooling
        uses: ./.github/actions/setup-ci-tooling
        with:
          dependency-spec: ".[dev,lsp]"
          install-node: "true"
          install-markdownlint: "true"
          install-actionlint: "true"

      - name: Check context health
        run: python scripts/context_health.py --check --json-output artifacts/health/context-health-nightly.json --markdown-output artifacts/health/context-health-nightly.md

      - name: Run fast pre-commit gate
        run: python -m pre_commit run --all-files

      - name: Run doc gardener
        run: sattlint-doc-gardener --check-only

      - name: Run layer linter
        run: sattlint-layer-lint

      - name: Run nightly repo audit
        run: sattlint-repo-audit --profile full --output-dir artifacts/audit-nightly --fail-on high

      - name: Build nightly repo health snapshot
        run: python scripts/repo_health.py --check --audit-dir artifacts/audit-nightly --json-output artifacts/health/repo-health-nightly.json --markdown-output artifacts/health/repo-health-nightly.md --html-output artifacts/health/repo-health-nightly.html --history-output artifacts/health/history/repo-health-nightly.json

      - name: Upload nightly health artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          if-no-files-found: ignore
          name: nightly-health-${{ github.run_id }}
          path: |
            artifacts/health/
            artifacts/audit-nightly/
