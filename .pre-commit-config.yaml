repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.0
    hooks:
      - id: ruff
        args: [--fix, --select, "E,F,W,I", --ignore, E501]
      - id: ruff-format

  - repo: local
    hooks:
      - id: markdownlint-cli2
        name: markdownlint-cli2 (repo-wide)
        language: system
        entry: python scripts/run_markdownlint.py
        args: [--config, .markdownlint-cli2.jsonc]
        pass_filenames: false
        always_run: true
      - id: pyright
        name: pyright
        language: system
        entry: python scripts/run_repo_python.py
        args: [-B, -m, pyright, src/sattlint, src/sattline_parser]
        pass_filenames: false
        always_run: true
      - id: sattlint-syntax-check
        name: SattLint syntax-check (staged SattLine files)
        language: system
        entry: python scripts/run_repo_python.py
        args: [-m, sattlint, syntax-check]
        files: \.(g|l|s)$
        exclude: ^tests/fixtures/
        pass_filenames: true
      - id: ruff-src-ci
        name: Ruff src (CI parity)
        language: system
        entry: python scripts/run_repo_python.py
        args: [-m, ruff, check, src]
        pass_filenames: false
        always_run: true
      - id: sattlint-doc-gardener
        name: SattLint doc-gardener
        language: system
        entry: python scripts/run_repo_python.py
        args: [-m, sattlint.devtools.doc_gardener, --check-only]
        pass_filenames: false
        always_run: true
      - id: pytest-quality
        name: Pytest quality gate
        language: system
        entry: python scripts/run_repo_python.py
        args: [-m, pytest, -q, --tb=short]
        pass_filenames: false
        always_run: true
      - id: ratchet-policy
        name: Ratchet policy gate
        language: system
        entry: python scripts/run_repo_python.py
        args: [scripts/check_ratchet_policy.py]
        pass_filenames: false
        always_run: true

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-added-large-files
        args: ['--maxkb=500']
