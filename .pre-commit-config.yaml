repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix, --ignore, E501]
      - id: ruff-format

  - repo: local
    hooks:
      - id: actionlint
        name: actionlint (GitHub workflows)
        language: system
        entry: python scripts/run_actionlint.py
        files: ^\.github/workflows/.*\.(yml|yaml)$
        pass_filenames: true
      - id: markdownlint-cli2
        name: markdownlint-cli2 (changed Markdown files)
        language: system
        entry: python scripts/run_markdownlint.py
        args: [--config, .markdownlint-cli2.jsonc]
        files: ^([^/]+\.md|docs/.*\.md|tests/fixtures/.*\.md|vscode/.*\.md)$
        pass_filenames: true
      - id: context-health
        name: Context health gate
        language: system
        entry: python scripts/run_repo_python.py
        args: [scripts/context_health.py, --check]
        files: ^(AGENTS\.md|README\.md|CONTRIBUTING\.md|ARCHITECTURE\.md|\.ai/.*|docs/maintainers/.*\.md|docs/public/architecture\.md|docs/references/ai-agent-reference\.md|\.vscode/(settings|extensions|tasks|mcp)\.json|metrics/ratchet\.json|\.github/instructions/.*\.md|\.github/hooks/.*\.json|\.github/workflows/.*\.(yml|yaml))$
        pass_filenames: false
      - id: sattlint-syntax-check
        name: SattLint syntax-check (staged SattLine files)
        language: system
        entry: python scripts/run_repo_python.py
        args: [-m, sattlint, syntax-check]
        files: \.(g|l|s)$
        exclude: ^tests/fixtures/
        pass_filenames: true

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-added-large-files
        args: ['--maxkb=500']
        exclude: ^artifacts/analysis/impact_analysis\.json$
