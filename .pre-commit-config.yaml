repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.0
    hooks:
      - id: ruff
        args: [--fix, --select, "E,F,W,I", --ignore, E501]
      - id: ruff-format

  - repo: local
    hooks:
      - id: markdownlint-cli2
        name: markdownlint-cli2 (changed Markdown files)
        language: system
        entry: python scripts/run_markdownlint.py
        args: [--config, .markdownlint-cli2.jsonc]
        files: ^([^/]+\.md|docs/.*\.md|tests/fixtures/.*\.md|vscode/.*\.md)$
        pass_filenames: true
      - id: context-health
        name: Context health gate
        language: system
        entry: python scripts/run_repo_python.py
        args: [scripts/context_health.py, --check]
        files: ^(AGENTS\.md|docs/(context-loading-order|repo-map|architecture|quality-gates|ai-workflows)\.md|\.vscode/(settings|extensions|tasks)\.json|metrics/ratchet\.json|\.ai/(tasks|handoffs)/.*\.json|\.github/agents/.*\.agent\.md|\.github/instructions/.*\.md|\.github/prompts/.*\.prompt\.md|\.github/skills/.*/SKILL\.md)$
        pass_filenames: false
      - id: sattlint-syntax-check
        name: SattLint syntax-check (staged SattLine files)
        language: system
        entry: python scripts/run_repo_python.py
        args: [-m, sattlint, syntax-check]
        files: \.(g|l|s)$
        exclude: ^tests/fixtures/
        pass_filenames: true

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-added-large-files
        args: ['--maxkb=500']
